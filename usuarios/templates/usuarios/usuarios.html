{% extends 'usuarios/base.html' %}
{% load widget_tweaks %} <!--Se usa para poder aplicar style a los objetos-->

{% block body %}

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-2xl shadow">

    <h1 class="text-2xl font-bold mb-6">
        Cargar Uuario
    </h1>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}

        {% for field in form %}
            <div class="">
                <label class="block mb-2 font-semibold text-amber-900">
                    {{ field.label }}
                </label>
                <div>
                    {{ field |add_class:"border-1 p-2 rounded" }}
                </div>    
            </div>
        {% endfor %}

        <button
            type="submit"
            class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg"
        >
            Cargar
        </button>

    </form>

</div>

{% endblock %}
