{% extends 'usuarios/base.html' %}
{% load widget_tweaks %}

{% block body %}


<div class="max-w-md mx-auto  bg-white p-6 rounded-2xl shadow">
    <h1 class="text-2xl mb-6">
        CONSULTAS
    </h1>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        {% for field in form %}
            <div>
                <label class="block mb-2 font-semibold text-amber-900">
                    {{ field.label }}
                </label>    
                <div>
                    {{ field | add_class:"border-1 p-2 rounded" }}
                </div>       
            </div>
        {% endfor %}
        <button
        type="submit" 
        style="cursor: pointer;" 
        class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">
            Enviar
        </button>
    </form>
</div>
    

{% endblock %}
