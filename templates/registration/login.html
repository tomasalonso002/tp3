{% extends 'usuarios/base.html' %}
{% load widget_tweaks %}

{%block body%}
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-2xl shadow">
    <p class="text-2xl font-bold mb-6">Iniciar sesión</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        
        {% for field in form %}
            <div>
                <label class="block mb-2 font-semibold text-amber-900">
                    {{field.label}}
                </label>
                
                <p class="bg-amber-500">{{field | add_class:"border-1 p-2 rounded"}}</p>

            </div>
        {% endfor %}
        
        <button 
        type="submit"
        style="cursor:pointer"
        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded"> 
        Ingresar</button>
    </form>
</div>
    {%endblock%}
