{% extends 'usuarios/base.html' %}

{% block title %}
    Eliminar Rutina
{% endblock %}

{% block body %}

<div class="flex justify-center items-center py-12">

    <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-200 max-w-md w-full">

        <!-- ICONO -->
        <div class="flex justify-center mb-4">

            <div class="bg-red-100 p-3 rounded-full">

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-10 w-10 text-red-600"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                    />
                </svg>

            </div>

        </div>

        <!-- TITULO -->
        <h2 class="text-2xl font-extrabold text-gray-800 text-center mb-2">
            ¿Eliminar Rutina?
        </h2>

        <p class="text-gray-500 text-center mb-6">
            Esta acción no se puede deshacer.
            Estás a punto de eliminar la siguiente rutina:
        </p>

        <!-- INFO RUTINA -->
        <div class="bg-gray-50 border-l-4 border-red-500 p-4 mb-8">

            <span class="text-xs uppercase font-bold text-gray-400">
                Nombre de la rutina
            </span>

            <h3 class="text-lg font-bold text-gray-900">
                {{ rutina.nombre }}
            </h3>

        </div>

        <!-- FORM -->
        <form method="POST" class="space-y-4">

            {% csrf_token %}

            <div class="flex flex-col gap-3">

                <button
                    type="submit"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg transition duration-300"
                >
                    Sí, eliminar rutina
                </button>

                <a
                    href="{% url 'rutinas' %}"
                    class="w-full text-center bg-gray-100 hover:bg-gray-200 text-gray-600 font-semibold py-3 rounded-xl transition duration-300"
                >
                    Cancelar y volver
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
